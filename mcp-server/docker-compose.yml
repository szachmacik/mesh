version: '3.8'

services:
  ssh-executor:
    build:
      context: .
      dockerfile: Dockerfile.ssh-executor
    container_name: ssh-executor
    restart: unless-stopped
    ports:
      - "3022:3022"
    environment:
      - PORT=3022
      - AUTH_TOKEN=${AUTH_TOKEN:-change-me}
      - COOLIFY_URL=${COOLIFY_URL:-https://coolify.ofshore.dev}
      - COOLIFY_TOKEN=${COOLIFY_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3022/health"]
      interval: 30s
      timeout: 5s
      retries: 3
