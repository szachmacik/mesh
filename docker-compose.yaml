version: '3.8'

services:
  ssh-executor:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile.ssh-executor
    container_name: ssh-executor
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "3022:3022"
    environment:
      - PORT=3022
      - AUTH_TOKEN=${AUTH_TOKEN:-change-me}
      - MAX_TIMEOUT=300
      - MAX_OUTPUT_SIZE=1048576
      - COOLIFY_URL=${COOLIFY_URL:-https://coolify.ofshore.dev}
      - COOLIFY_TOKEN=${COOLIFY_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root:/host/root:ro
      - /etc:/host/etc:ro
      - /var/log:/host/logs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3022/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
