services:
  ssh-executor:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile.ssh-executor
    container_name: ssh-executor
    restart: unless-stopped
    ports:
      - "3022:3022"
    environment:
      - PORT=3022
      - AUTH_TOKEN=${AUTH_TOKEN}
      - COOLIFY_URL=${COOLIFY_URL:-https://coolify.ofshore.dev}
      - COOLIFY_TOKEN=${COOLIFY_TOKEN}
      - MAX_TIMEOUT=300
      - MAX_OUTPUT_SIZE=1048576
    volumes:
      # CRITICAL: Mount Docker socket for direct Docker access
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Mount common data directories for docker-compose operations
      - /home:/host/home:rw
      - /opt:/host/opt:rw
      - /root:/host/root:rw
      - /data:/host/data:rw
    # Run as root to access Docker socket
    user: root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3022/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
